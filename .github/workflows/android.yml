name: Android APK (Buildozer)

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            build-essential \
            python3-pip python3-setuptools python3-wheel \
            libffi-dev libssl-dev zlib1g-dev \
            libsqlite3-dev libgdbm-dev libbz2-dev liblzma-dev \
            libreadline-dev libncurses5-dev libncursesw5-dev \
            libgmp-dev libjpeg-dev libpng-dev libtiff5-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          python -m pip install buildozer==1.5.0 cython

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ondas-apk
          path: bin/*.apk

